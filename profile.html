<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - ClassHub Lite</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

<nav class="navbar">
    <h1 class="slideIn">ClassHub Lite</h1>

    <ul>
        <li><a href="index.html">Főoldal</a></li>
        <li><a href="profile.html" class="activepage">Profil</a></li>
        <li><a href="gallery.html">Galéria</a></li>
        <li><a href="events.html">Események</a></li>
        <li><a href="timetable.html">Órarend</a></li>
    </ul>

    <div id="darkModeContainer">
        <p>Dark Mode</p>
        <button id="darkModeBtn">🌙</button>
    </div>

</nav>

<main class="profile-wrapper">


    <div class="profile-card">

        <div class="avatar"></div>

        <h2 contenteditable="true" id="name">Név: </h2>
        
        <p contenteditable="true" id="role">Nem:</p>

        <div class="divider"></div>

        <h3>Rólam</h3>
        <p contenteditable="true" id="bio">
           Bemutatkozás:
        </p>

        <div class="divider"></div>

        <h3>Statisztika</h3>
        <p contenteditable="true" id="projects"> </p>
        <p contenteditable="true" id="skills"></p>
        <p contenteditable="true" id="motivation"></p>

        <div class="divider"></div>

        <button class="like-btn" onclick="saveProfile()">🖫 Mentés</button>

    </div>
                    <div class="loader-container">
    <div class="loader"></div>
</main>

<script src="js/profile.js"></script>
<script src="js/darkmode.js"></script>

</body>
</html>
